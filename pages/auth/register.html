<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Blood Bank Management System</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/auth.css">
  <link rel="stylesheet" href="../../assets/css/register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="register-page">
  <div class="auth-container" style="--auth-bg-image: url('../../assets/images/login page.jpg')">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-droplet"></i>
        </div>
        <h1>Blood Bank</h1>
        <p>Create your account</p>
      </div>

      <div id="alertContainer"></div>

      <!-- Role Selection -->
      <div class="role-selection" id="roleSelection">
        <div class="role-selection-title">Select your role:</div>
        <div class="role-buttons">
          <button type="button" class="role-btn" data-role="donor">
            <img class="role-img" src="../../assets/images/blood-donor.png" alt="Donor">
            <span>Donor</span>
          </button>
          <button type="button" class="role-btn" data-role="organization">
            <img class="role-img" src="../../assets/images/organization icon.png" alt="Organization">
            <span>Organization</span>
          </button>
          <button type="button" class="role-btn" data-role="hospital">
            <img class="role-img" src="../../assets/images/hospital icon.png" alt="Hospital">
            <span>Hospital</span>
          </button>
        </div>
      </div>

      <!-- Registration Form -->
      <form id="registerForm" class="auth-form hidden">
        <!-- Common Fields -->
        <div class="form-section">
          <h3 class="form-section-title">Basic Information</h3>

          <div class="form-group">
            <label for="email">
              <i class="fas fa-envelope"></i> Email Address
            </label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="Enter your email"
              required
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i> Password
            </label>
            <div class="password-field">
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Create a strong password"
                required
              >
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="form-error"></span>
            <small class="password-hint">At least 8 characters with uppercase, lowercase, and numbers</small>
          </div>

          <div class="form-group">
            <label for="confirmPassword">
              <i class="fas fa-lock"></i> Confirm Password
            </label>
            <div class="password-field">
              <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                placeholder="Confirm your password"
                required
              >
              <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="phone">
              <i class="fas fa-phone"></i> Phone Number
            </label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              placeholder="Enter your phone number"
              required
            >
            <span class="form-error"></span>
          </div>
        </div>

        <!-- Donor Fields -->
        <div class="form-section" id="donorFields">
          <h3 class="form-section-title">Donor Information</h3>

          <div class="form-group">
            <label for="fullName">
              <i class="fas fa-user"></i> Full Name
            </label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName" 
              placeholder="Enter your full name"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="age">
                <i class="fas fa-birthday-cake"></i> Age
              </label>
              <input 
                type="number" 
                id="age" 
                name="age" 
                placeholder="18-65"
                min="18"
                max="65"
              >
              <span class="form-error"></span>
            </div>

            <div class="form-group">
              <label for="gender">
                <i class="fas fa-venus-mars"></i> Gender
              </label>
              <select id="gender" name="gender">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              <span class="form-error"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="bloodGroup">
              <i class="fas fa-droplet"></i> Blood Group
            </label>
            <select id="bloodGroup" name="bloodGroup">
              <option value="">Select blood group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="city">
              <i class="fas fa-city"></i> City
            </label>
            <input 
              type="text" 
              id="city" 
              name="city" 
              placeholder="Enter your city"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="address">
              <i class="fas fa-map-pin"></i> Address
            </label>
            <input 
              type="text" 
              id="address" 
              name="address" 
              placeholder="Enter your full address"
            >
            <span class="form-error"></span>
          </div>
        </div>

        <!-- Organization Fields -->
        <div class="form-section hidden" id="organizationFields">
          <h3 class="form-section-title">Organization Information</h3>

          <div class="form-group">
            <label for="organizationName">
              <i class="fas fa-building"></i> Organization Name
            </label>
            <input 
              type="text" 
              id="organizationName" 
              name="organizationName" 
              placeholder="Enter organization name"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="licenseNumber">
              <i class="fas fa-certificate"></i> License/Registration Number
            </label>
            <input 
              type="text" 
              id="licenseNumber" 
              name="licenseNumber" 
              placeholder="Enter license number"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="orgCity">
              <i class="fas fa-city"></i> City
            </label>
            <input 
              type="text" 
              id="orgCity" 
              name="orgCity" 
              placeholder="Enter city"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="orgAddress">
              <i class="fas fa-map-pin"></i> Address
            </label>
            <input 
              type="text" 
              id="orgAddress" 
              name="orgAddress" 
              placeholder="Enter full address"
            >
            <span class="form-error"></span>
          </div>
        </div>

        <!-- Hospital Fields -->
        <div class="form-section hidden" id="hospitalFields">
          <h3 class="form-section-title">Hospital Information</h3>

          <div class="form-group">
            <label for="hospitalName">
              <i class="fas fa-hospital"></i> Hospital Name
            </label>
            <input 
              type="text" 
              id="hospitalName" 
              name="hospitalName" 
              placeholder="Enter hospital name"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="hospitalLicense">
              <i class="fas fa-certificate"></i> License Number
            </label>
            <input 
              type="text" 
              id="hospitalLicense" 
              name="hospitalLicense" 
              placeholder="Enter license number"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="hospitalCity">
              <i class="fas fa-city"></i> City
            </label>
            <input 
              type="text" 
              id="hospitalCity" 
              name="hospitalCity" 
              placeholder="Enter city"
            >
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label for="hospitalAddress">
              <i class="fas fa-map-pin"></i> Address
            </label>
            <input 
              type="text" 
              id="hospitalAddress" 
              name="hospitalAddress" 
              placeholder="Enter full address"
            >
            <span class="form-error"></span>
          </div>
        </div>

        <!-- Terms & Conditions -->
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="terms" name="terms" required>
            <span>I agree to the <a href="#" target="_blank">Terms and Conditions</a></span>
          </label>
          <span class="form-error"></span>
        </div>

        <!-- Buttons -->
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="goBackToRoleSelection()">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
        </div>
      </form>

      <!-- Footer Links -->
      <div class="auth-footer">
        <p>Already have an account? 
          <a href="login.html">Login here</a>
        </p>
        <p>Back to 
          <a href="../../index.html">Home</a>
        </p>
      </div>
    </div>

  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="loading-spinner hidden">
    <div class="spinner"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>

  <!-- Scripts -->
  <script src="../../assets/js/firebase-config.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="auth-register.js"></script>
</body>
</html>
