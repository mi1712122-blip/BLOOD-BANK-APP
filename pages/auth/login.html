<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Blood Bank Management System</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <link rel="stylesheet" href="../../assets/css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
  <div class="auth-container" style="--auth-bg-image: url('../../assets/images/login page.jpg')">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-droplet"></i>
        </div>
        <h1>Blood Bank</h1>
        <p>Login to your account</p>
      </div>

      <div id="alertContainer"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email"
            required
          >
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="form-error"></span>
        </div>

        <div class="form-group">
          <label for="role">Login as</label>
          <select id="role" name="role" required>
            <option value="">Select your role</option>
            <option value="donor">Donor</option>
            <option value="organization">Organization</option>
            <option value="hospital">Hospital</option>
            <option value="admin">Admin</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Login
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? 
          <a href="register.html">Create account</a>
        </p>
        <p>Back to 
          <a href="../../index.html">Home</a>
        </p>
      </div>
    </div>

    <!-- Background image is set via the --auth-bg-image CSS variable on the .auth-container element. Replace the URL above with your image path. -->
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="loading-spinner hidden">
    <div class="spinner"></div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js"></script>

  <!-- Scripts -->
  <script src="../../assets/js/firebase-config.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="auth-login.js"></script>
</body>
</html>
